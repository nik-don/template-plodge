<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Request Generator</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <img src="https://palmerslodge.uk/wp-content/uploads/2020/03/pl_logo-london-inverted-rgb@2x.png" alt="Palmers Lodge Logo" class="logo">
        <h1>Payment Request Generator</h1>
        <form id="reservationForm">
            <div class="form-group">
                <label for="name">Name:</label>
                <input type="text" id="name" name="name" required>
                <button type="button" onclick="pasteText('name')">Paste</button>
            </div>
            <div class="form-group">
                <label for="reservationId">Reservation ID:</label>
                <input type="text" id="reservationId" name="reservationId" required>
                <button type="button" onclick="pasteText('reservationId')">Paste</button>
            </div>
            <div class="form-group">
                <label for="checkinDate">Check-in Date:</label>
                <input type="date" id="checkinDate" name="checkinDate" required>
            </div>
            <div class="button-group">
                <button type="button" onclick="generateText()">Generate Text</button>
                <button type="button" onclick="clearFields()">Clear Fields</button>
            </div>
        </form>
        <textarea id="outputText" readonly></textarea>
        <button class="copy-button" type="button" onclick="copyText()">Copy Text</button>
    </div>
    <script src="script.js"></script>
</body>
</html>
